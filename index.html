<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Aquarium</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#001f3f">
<link rel="apple-touch-icon" href="icon.png">

<style>
body {
  margin: 0;
  overflow: hidden;
  background: linear-gradient(#001f3f, #003366);
  font-family: sans-serif;
}

#ui {
  position: fixed;
  bottom: 20px;
  left: 20px;
  display: flex;
  gap: 10px;
}

button {
  padding: 10px 16px;
  margin-right: 10px;
  border-radius: 10px;
  border: none;
  background: rgba(255,255,255,0.9);
  font-size: 14px;
  cursor: pointer;
}

#status {
  position: fixed;
  top: 20px;
  left: 20px;
  color: white;
  font-size: 13px;
  line-height: 1.8;
  text-shadow: 0 1px 4px rgba(0,0,0,0.5);
}
</style>
</head>
<body>

<canvas id="canvas"></canvas>

<div id="ui">
  <button id="feed">餵食</button>
  <button id="clean">換水</button>
</div>

<div id="status"></div>

<script>
window.onload = function() {

  const canvas = document.getElementById("canvas");
  const ctx = canvas.getContext("2d");

  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;

  // 🌊 系統
  const gameState = {
    fishes: [],
    waterQuality: 100,
    lastUpdate: Date.now()
  };

  // 🐟 建魚
  function createFish() {
    return {
      id: Date.now() + Math.random(),
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      vx: Math.random() * 2 - 1,
      vy: Math.random() * 2 - 1,
      hunger: 100,
      health: 100
    };
  }

  // 💾 存檔
  function saveGame() {
    localStorage.setItem("aquariumSave", JSON.stringify(gameState));
  }

  // 📂 讀檔
  function loadGame() {
    const data = localStorage.getItem("aquariumSave");
    if (data) {
      Object.assign(gameState, JSON.parse(data));
    } else {
      for (let i = 0; i < 6; i++) {
        gameState.fishes.push(createFish());
      }
    }
  }

  // ⏳ 離線進度
  function applyOffline() {
    const now = Date.now();
    const diff = (now - gameState.lastUpdate) / 1000;
    gameState.fishes.forEach(f => {
      f.hunger -= diff * 0.01;
      f.health -= diff * 0.005;
    });
    gameState.waterQuality -= diff * 0.002;
    gameState.lastUpdate = now;
  }

  // 🍞 食物
  let foods = [];

  canvas.addEventListener("click", function(e) {
    foods.push({ x: e.clientX, y: 0 });
  });

  // 🎮 UI
  document.getElementById("feed").onclick = function() {
    gameState.fishes.forEach(f => f.hunger += 20);
  };

  document.getElementById("clean").onclick = function() {
    gameState.waterQuality = 100;
  };

  // 🔁 主迴圈
  function animate() {
    requestAnimationFrame(animate);

    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // 🌙 日夜變化
    let time = Date.now() * 0.00005;
    let brightness = 20 + Math.sin(time) * 10;
    document.body.style.background =
      `linear-gradient(rgb(0, ${Math.round(31 + brightness)}, rgb(${Math.round(63 + brightness * 2)}), rgb(${Math.round(102 + brightness * 2)}))`;
    // 簡化版漸層背景
    document.body.style.background =
      `linear-gradient(rgb(0, ${Math.round(20 + brightness)}), rgb(${Math.round(31 + brightness)}), rgb(${Math.round(51 + brightness * 2)}))`;

    // 水質下降
    gameState.waterQuality -= 0.002;
    if (gameState.waterQuality < 0) gameState.waterQuality = 0;

    // 食物
    foods.forEach(food => {
      food.y += 1;
      ctx.beginPath();
      ctx.arc(food.x, food.y, 3, 0, Math.PI * 2);
      ctx.fillStyle = "brown";
      ctx.fill();
    });

    // 🐟 魚
    gameState.fishes.forEach(f => {

      f.hunger -= 0.02;
      if (f.hunger < 0) f.hunger = 0;

      if (f.hunger < 20 || gameState.waterQuality < 50) {
        f.health -= 0.02;
      }

      if (f.health < 0) f.health = 0;

      let speed = f.hunger < 30 ? 2 : 1;
      if (f.health < 50) speed *= 0.5;

      let target = foods[0];
      if (target) {
        f.vx = (target.x - f.x) * 0.01;
        f.vy = (target.y - f.y) * 0.01;
      }

      f.x += f.vx * speed;
      f.y += f.vy * speed;

      if (f.x < 0 || f.x > canvas.width) f.vx *= -1;
      if (f.y < 0 || f.y > canvas.height) f.vy *= -1;

      // 吃食物
      foods = foods.filter(food => {
        let dx = f.x - food.x;
        let dy = f.y - food.y;
        let dist = Math.sqrt(dx * dx + dy * dy);

        if (dist < 10) {
          f.hunger = Math.min(100, f.hunger + 40);
          return false;
        }
        return true;
      });

      // 🎨 顏色＝情緒（健康差變暗）
      let light = f.health < 50 ? 30 : 50;
      ctx.beginPath();
      ctx.arc(f.x, f.y, 6, 0, Math.PI * 2);
      ctx.fillStyle = `hsl(${f.hunger * 1.2}, 70%, ${light}%)`;
      ctx.fill();
    });

    // 狀態顯示
    document.getElementById("status").innerHTML =
      "水質: " + gameState.waterQuality.toFixed(0) + "<br>" +
      "魚數: " + gameState.fishes.length;
  }

  // 🚀 啟動
  loadGame();
  applyOffline();
  setInterval(saveGame, 5000);
  animate();

  // 📲 Service Worker
  if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("sw.js");
  }

};
</script>

</body>
</html>
